name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: de0cv_emulator-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: de0cv_emulator-macos-aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: de0cv_emulator-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: de0cv_emulator-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Remove quarantine attribute (macOS)
        if: runner.os == 'macOS'
        run: xattr -cr target/${{ matrix.target }}/release/de0cv_emulator

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x de0cv_emulator
          tar czf ../../../${{ matrix.name }}.tar.gz de0cv_emulator
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip de0cv_emulator.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
